name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  packages: write

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build Web Application
        run: npm run build

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run Unit Tests
        run: npm run test:run

  build-and-push:
    runs-on: ubuntu-latest
    needs: [lint, build, test]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Heroku Container Registry
        uses: docker/login-action@v3
        with:
          registry: registry.heroku.com
          username: _
          password: ${{ secrets.HEROKU_API_KEY }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: registry.heroku.com/${{ secrets.HEROKU_APP_NAME_WEB }}/web
          provenance: false
          sbom: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install Heroku CLI
        run: curl https://cli-assets.heroku.com/install.sh | sh

      - name: Release Heroku Container
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        env:
          HEROKU_API_KEY: ${{ secrets.HEROKU_API_KEY }}
        run: |
          heroku stack:set container --app ${{ secrets.HEROKU_APP_NAME_WEB }}
          heroku container:release web --app ${{ secrets.HEROKU_APP_NAME_WEB }} || {
            echo "========================================="
            echo "Release failed! Fetching Heroku release logs..."
            echo "========================================="
            heroku releases --app ${{ secrets.HEROKU_APP_NAME_WEB }} -n 5
            heroku logs --app ${{ secrets.HEROKU_APP_NAME_WEB }} -n 100
            exit 1
          }

      - name: Health Check
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        env:
          HEROKU_API_KEY: ${{ secrets.HEROKU_API_KEY }}
        run: |
          echo "Waiting for dyno to start..."
          sleep 20
          echo "Checking dyno status..."
          heroku ps --app ${{ secrets.HEROKU_APP_NAME_WEB }}
          HEROKU_APP_URL=$(heroku apps:info --app ${{ secrets.HEROKU_APP_NAME_WEB }} --json | python3 -c "import sys, json; print(json.load(sys.stdin)['web_url'])")
          echo "Checking app at: ${HEROKU_APP_URL}"
          HTTP_CODE=$(curl -f -s -o /dev/null -w "%{http_code}" "${HEROKU_APP_URL}")
          if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "301" ]; then
            echo "Health check passed! (HTTP $HTTP_CODE)"
          else
            echo "Health check failed! (HTTP $HTTP_CODE)"
            heroku logs --app ${{ secrets.HEROKU_APP_NAME_WEB }} -n 50
            exit 1
          fi
